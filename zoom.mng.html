<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>מערכת ניהול Zoom - תעשיידע</title>
  <style>
    :root {
      --bg: #f6f8fc;
      --panel: #ffffff;
      --border: #d9e1ee;
      --text: #1c2433;
      --muted: #6f7b90;
      --zoom1: #3b82f6;
      --zoom2: #16a34a;
      --zoom3: #9333ea;
      --danger: #dc2626;
      --ok: #16a34a;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, "Segoe UI", system-ui, sans-serif;
      background: linear-gradient(180deg, #f8faff 0%, #eef3fb 100%);
      color: var(--text);
      min-height: 100vh;
    }

    .container {
      max-width: 100%;
      margin: 0 auto;
      padding: 12px;
    }

    .header {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .title-wrap h1 {
      margin: 0;
      font-size: 1.15rem;
      font-weight: 800;
    }

    .title-wrap p {
      margin: 3px 0 0;
      color: var(--muted);
      font-size: 0.78rem;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--border);
      background: #fff;
      color: #334155;
      border-radius: 999px;
      font-size: 0.75rem;
      padding: 4px 8px;
    }

    .dot { width: 10px; height: 10px; border-radius: 50%; }
    .dot.z1 { background: var(--zoom1); }
    .dot.z2 { background: var(--zoom2); }
    .dot.z3 { background: var(--zoom3); }

    button, select, input {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #fff;
      color: var(--text);
      padding: 5px 8px;
      font-size: 0.8rem;
    }

    button {
      cursor: pointer;
      transition: .2s ease;
    }

    button:hover { transform: translateY(-1px); }

    .danger-btn {
      border-color: #fecaca;
      color: #991b1b;
      background: #fff1f2;
    }

    .board-wrap {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: auto;
      box-shadow: 0 8px 20px rgba(15, 23, 42, .06);
    }

    .board {
      min-width: 980px;
      display: grid;
      grid-template-columns: 95px repeat(6, minmax(120px, 1fr));
    }

    .head-cell {
      position: sticky;
      top: 0;
      z-index: 3;
      background: #f5f8ff;
      border-bottom: 1px solid var(--border);
      border-left: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-weight: 700;
      font-size: 0.78rem;
      padding: 6px 4px;
    }

    .time-cell {
      border-top: 1px solid var(--border);
      border-left: 1px solid var(--border);
      background: #fbfdff;
      font-size: 0.72rem;
      color: #334155;
      padding: 6px 4px;
      font-weight: 700;
      text-align: center;
      position: sticky;
      right: 0;
      z-index: 2;
    }

    .slot {
      border-top: 1px solid var(--border);
      border-left: 1px solid var(--border);
      min-height: 62px;
      padding: 4px;
      transition: background .2s ease;
      position: relative;
    }

    .slot:hover { background: #f8fbff; }

    .slot.empty::before {
      content: "+ שיבוץ";
      color: #94a3b8;
      font-size: .7rem;
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      pointer-events: none;
    }

    .slot.drag-over {
      outline: 2px dashed #60a5fa;
      outline-offset: -3px;
      background: #eff6ff;
    }

    .event-card {
      border-radius: 8px;
      color: #fff;
      padding: 5px 6px;
      font-size: .72rem;
      line-height: 1.15;
      box-shadow: 0 6px 14px rgba(15, 23, 42, 0.22);
      cursor: pointer;
      transition: transform .2s ease;
      margin-bottom: 4px;
    }

    .event-card:last-child { margin-bottom: 0; }

    .event-card:hover { transform: scale(1.02); }
    .event-card.z1 { background: linear-gradient(180deg, #3b82f6, #2563eb); }
    .event-card.z2 { background: linear-gradient(180deg, #22c55e, #16a34a); }
    .event-card.z3 { background: linear-gradient(180deg, #a855f7, #9333ea); }

    .event-card .line1 { font-weight: 700; }
    .event-card .line2 { opacity: .92; margin-top: 2px; }

    .slot-capacity {
      position: absolute;
      left: 4px;
      bottom: 3px;
      font-size: .62rem;
      color: #94a3b8;
      pointer-events: none;
    }

    dialog {
      border: none;
      border-radius: 14px;
      padding: 0;
      width: min(440px, 92vw);
      box-shadow: 0 30px 60px rgba(15, 23, 42, 0.25);
    }

    dialog::backdrop { background: rgba(15, 23, 42, 0.45); }

    .modal {
      padding: 18px;
      display: grid;
      gap: 12px;
    }

    .modal h3 { margin: 0; }
    .meta { color: var(--muted); font-size: .85rem; }

    .row { display: grid; gap: 6px; }

    .actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 4px;
    }

    .status {
      min-height: 18px;
      font-size: .82rem;
      color: var(--danger);
    }

    .footnote {
      margin-top: 12px;
      font-size: .82rem;
      color: var(--muted);
      text-align: left;
    }

    @media (max-width: 760px) {
      .container { padding: 12px; }
      .header { margin-bottom: 10px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="title-wrap">
        <h1>📅 לוח שיבוץ שבועי - מערך Zoom תעשיידע</h1>
        <p>מניעת שיבוץ כפול בזמן אמת + Drag & Drop + שמירה אוטומטית</p>
      </div>

      <div class="toolbar">
        <label class="chip"><span class="dot z1"></span> Zoom1</label>
        <label class="chip"><span class="dot z2"></span> Zoom2</label>
        <label class="chip"><span class="dot z3"></span> Zoom3</label>
        <input id="searchInstructor" type="text" placeholder="חיפוש מדריך..." />
        <select id="zoomFilter">
          <option value="">כל חשבונות הזום</option>
          <option value="Zoom1">Zoom1</option>
          <option value="Zoom2">Zoom2</option>
          <option value="Zoom3">Zoom3</option>
        </select>
        <button id="clearWeekBtn" class="danger-btn">נקה שבוע</button>
      </div>
    </div>

    <div class="board-wrap">
      <div class="board" id="board"></div>
    </div>

    <div class="footnote" id="stats"></div>
  </div>

  <dialog id="slotModal">
    <form method="dialog" class="modal" id="slotForm">
      <h3 id="modalTitle">שיבוץ משבצת</h3>
      <div class="meta" id="slotMeta"></div>

      <div class="row">
        <label for="instructorSelect">Instructor</label>
        <select id="instructorSelect" required></select>
      </div>

      <div class="row">
        <label for="zoomSelect">Zoom Account</label>
        <select id="zoomSelect" required></select>
      </div>

      <div class="status" id="validationMessage"></div>

      <div class="actions">
        <button value="cancel" type="button" id="deleteBtn" class="danger-btn">Delete</button>
        <button value="cancel" type="button" id="cancelBtn">ביטול</button>
        <button id="saveBtn" value="default">Save</button>
      </div>
    </form>
  </dialog>

  <script>
    const DAYS = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday"];
    const TIME_SLOTS_SHORT = ["08:00-09:00", "09:00-10:00", "10:00-11:00", "11:00-12:00", "12:00-13:00", "13:00-14:00", "14:00-15:00"];
    const TIME_SLOTS_LONG = ["08:00-10:00", "10:00-12:00", "12:00-14:00", "14:00-16:00"];
    const TIME_SLOTS = [...TIME_SLOTS_SHORT, ...TIME_SLOTS_LONG];
    const ZOOMS = ["Zoom1", "Zoom2", "Zoom3"];

    const INSTRUCTORS = [
      "הנאא אבו אמזה", "הילה רוזן", "ראנה סאלח", "סוהא סאלם", "מיכל שכטמן", "אלדר מיכאל טייב",
      "אביגדור שרון", "אסיל ג'בר", "אביב בלנדר", "ברקת קטעי", "ליאל בן חמו", "אלכס זפקה",
      "אפרת אוחיון", "עליזה מולה", "כרמית סמנדרוב", "קרן גורביץ", "אוריה פדידה", "אילנה טיטייבסקי"
    ];

    const STORAGE_KEY = "scheduleData";
    let schedule = loadSchedule();
    let modalContext = null;

    const boardEl = document.getElementById("board");
    const modal = document.getElementById("slotModal");
    const instructorSelect = document.getElementById("instructorSelect");
    const zoomSelect = document.getElementById("zoomSelect");
    const validationMessage = document.getElementById("validationMessage");
    const searchInstructor = document.getElementById("searchInstructor");
    const zoomFilter = document.getElementById("zoomFilter");

    function parseSlot(slot) {
      const [start, end] = slot.split("-").map(toMinutes);
      return { start, end };
    }

    function toMinutes(hhmm) {
      const [h, m] = hhmm.split(":").map(Number);
      return h * 60 + m;
    }

    function slotsOverlap(a, b) {
      const s1 = parseSlot(a);
      const s2 = parseSlot(b);
      return s1.start < s2.end && s2.start < s1.end;
    }

    function loadSchedule() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        const parsed = raw ? JSON.parse(raw) : [];
        return Array.isArray(parsed) ? parsed : [];
      } catch {
        return [];
      }
    }

    function persistSchedule() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(schedule));
    }

    function eventKey(event) {
      return `${event.day}|${event.time}|${event.zoom}`;
    }

    function findEvents(day, time) {
      return schedule.filter((e) => e.day === day && e.time === time);
    }

    function findEventByKey(key) {
      return schedule.find((e) => eventKey(e) === key) || null;
    }

    function overlapsAt(day, time, predicate, ignoreKey = "") {
      return schedule.some((e) => {
        const key = `${e.day}|${e.time}`;
        if (ignoreKey && key === ignoreKey) return false;
        return e.day === day && slotsOverlap(e.time, time) && predicate(e);
      });
    }

    function isInstructorFree(day, time, instructor, ignoreKey = "") {
      return !overlapsAt(day, time, (e) => e.instructor === instructor, ignoreKey);
    }

    function isZoomFree(day, time, zoom, ignoreKey = "") {
      return !overlapsAt(day, time, (e) => e.zoom === zoom, ignoreKey);
    }

    function getAvailableZooms(day, time, ignoreKey = "") {
      return ZOOMS.filter((z) => isZoomFree(day, time, z, ignoreKey));
    }

    function upsertEvent(payload, previousKey = "") {
      const idx = previousKey
        ? schedule.findIndex((e) => eventKey(e) === previousKey)
        : schedule.findIndex((e) => eventKey(e) === eventKey(payload));
      if (idx >= 0) schedule[idx] = payload;
      else schedule.push(payload);
      persistSchedule();
      renderBoard();
    }

    function deleteEventByKey(key) {
      schedule = schedule.filter((e) => eventKey(e) !== key);
      persistSchedule();
      renderBoard();
    }

    function getPreferredZoom(day, time, instructor, ignoreKey = "") {
      const freeZooms = getAvailableZooms(day, time, ignoreKey);
      if (!freeZooms.length) return "";

      const previousSameDay = schedule.find((e) => e.day === day && e.instructor === instructor && eventKey(e) !== ignoreKey);
      if (previousSameDay && freeZooms.includes(previousSameDay.zoom)) {
        return previousSameDay.zoom;
      }

      return ZOOMS.find((z) => freeZooms.includes(z)) || "";
    }

    function eventVisible(ev) {
      const text = searchInstructor.value.trim();
      const z = zoomFilter.value;
      if (text && !ev.instructor.includes(text)) return false;
      if (z && ev.zoom !== z) return false;
      return true;
    }

    function renderBoard() {
      boardEl.innerHTML = "";

      boardEl.insertAdjacentHTML("beforeend", `<div class="head-cell">שעה</div>`);
      DAYS.forEach((d) => boardEl.insertAdjacentHTML("beforeend", `<div class="head-cell">${d}</div>`));

      TIME_SLOTS.forEach((slot) => {
        boardEl.insertAdjacentHTML("beforeend", `<div class="time-cell">${slot}</div>`);
        DAYS.forEach((day) => {
          const allEvents = findEvents(day, slot);
          const visibleEvents = allEvents.filter(eventVisible);
          const emptyClass = visibleEvents.length === 0 ? "empty" : "";
          const cards = visibleEvents.map((ev) => {
            const key = eventKey(ev);
            return `<div class="event-card ${ev.zoom === "Zoom1" ? "z1" : ev.zoom === "Zoom2" ? "z2" : "z3"}" draggable="true" data-drag-key="${key}">
                <div class="line1">${ev.instructor}</div>
                <div class="line2">${ev.zoom}</div>
              </div>`;
          }).join("");

          boardEl.insertAdjacentHTML(
            "beforeend",
            `<div class="slot ${emptyClass}" data-day="${day}" data-time="${slot}">${cards}<div class="slot-capacity">${allEvents.length}/3 Zoom used</div></div>`
          );
        });
      });

      attachInteractions();
      updateStats();
    }

    function attachInteractions() {
      document.querySelectorAll(".slot").forEach((slotEl) => {
        slotEl.onclick = () => openModal(slotEl.dataset.day, slotEl.dataset.time);

        slotEl.ondragover = (e) => {
          e.preventDefault();
          slotEl.classList.add("drag-over");
        };

        slotEl.ondragleave = () => slotEl.classList.remove("drag-over");

        slotEl.ondrop = (e) => {
          e.preventDefault();
          slotEl.classList.remove("drag-over");
          const dragKey = e.dataTransfer.getData("text/plain");
          if (!dragKey) return;

          const moving = findEventByKey(dragKey);
          if (!moving) return;

          const fromDay = moving.day;
          const fromTime = moving.time;
          const toDay = slotEl.dataset.day;
          const toTime = slotEl.dataset.time;
          if (fromDay === toDay && fromTime === toTime) return;

          if (findEvents(toDay, toTime).length >= ZOOMS.length) {
            return alert("No available Zoom accounts for this time slot.");
          }

          if (!isInstructorFree(toDay, toTime, moving.instructor, eventKey(moving))) {
            return alert("לא ניתן לגרור: המדריך כבר משובץ בשעה חופפת.");
          }
          if (!isZoomFree(toDay, toTime, moving.zoom, eventKey(moving))) {
            return alert("לא ניתן לגרור: חשבון הזום כבר בשימוש בשעה חופפת.");
          }

          const updated = { ...moving, day: toDay, time: toTime };
          upsertEvent(updated, eventKey(moving));
        };
      });

      document.querySelectorAll(".event-card").forEach((card) => {
        card.onclick = (e) => {
          e.stopPropagation();
          openModalByKey(card.dataset.dragKey);
        };

        card.ondragstart = (e) => {
          e.dataTransfer.effectAllowed = "move";
          e.dataTransfer.setData("text/plain", card.dataset.dragKey);
        };
      });
    }

    function openModal(day, time) {
      modalContext = { day, time, existing: null };

      document.getElementById("slotMeta").textContent = `${day} | ${time}`;
      document.getElementById("modalTitle").textContent = "New Assignment";
      document.getElementById("deleteBtn").style.display = "none";

      instructorSelect.innerHTML = `<option value="">בחר מדריך</option>${INSTRUCTORS.map(i => `<option value="${i}">${i}</option>`).join("")}`;
      instructorSelect.value = "";

      refreshZoomOptions();
      zoomSelect.value = "";
      validateSelections();

      modal.showModal();
    }

    function openModalByKey(key) {
      const existing = findEventByKey(key);
      if (!existing) return;
      modalContext = { day: existing.day, time: existing.time, existing };

      document.getElementById("slotMeta").textContent = `${existing.day} | ${existing.time}`;
      document.getElementById("modalTitle").textContent = existing ? "Edit Slot" : "New Assignment";
      document.getElementById("deleteBtn").style.display = existing ? "inline-block" : "none";

      instructorSelect.innerHTML = `<option value="">בחר מדריך</option>${INSTRUCTORS.map(i => `<option value="${i}">${i}</option>`).join("")}`;
      instructorSelect.value = existing ? existing.instructor : "";

      refreshZoomOptions();
      zoomSelect.value = existing ? existing.zoom : "";
      validateSelections();

      modal.showModal();
    }

    function refreshZoomOptions() {
      if (!modalContext) return;
      const { day, time, existing } = modalContext;
      const ignore = existing ? eventKey(existing) : "";
      const free = getAvailableZooms(day, time, ignore);
      const options = new Set(free);
      if (existing?.zoom) options.add(existing.zoom);

      zoomSelect.innerHTML = `<option value="">בחר Zoom</option>${[...options].map(z => `<option value="${z}">${z}</option>`).join("")}`;
    }

    function validateSelections() {
      if (!modalContext) return false;
      validationMessage.textContent = "";

      const instructor = instructorSelect.value;
      const zoom = zoomSelect.value;
      const { day, time, existing } = modalContext;
      const ignore = existing ? eventKey(existing) : "";

      if (!existing && findEvents(day, time).length >= ZOOMS.length) {
        validationMessage.textContent = "No available Zoom accounts for this time slot.";
        document.getElementById("saveBtn").disabled = true;
        return false;
      }

      if (!instructor || !zoom) {
        document.getElementById("saveBtn").disabled = true;
        return false;
      }

      if (!isInstructorFree(day, time, instructor, ignore)) {
        validationMessage.textContent = "המדריך לא פנוי בזמן זה.";
        document.getElementById("saveBtn").disabled = true;
        return false;
      }

      if (!isZoomFree(day, time, zoom, ignore)) {
        validationMessage.textContent = "חשבון הזום לא פנוי בזמן זה.";
        document.getElementById("saveBtn").disabled = true;
        return false;
      }

      document.getElementById("saveBtn").disabled = false;
      return true;
    }

    document.getElementById("slotForm").onsubmit = (e) => {
      e.preventDefault();
      if (!modalContext || !validateSelections()) return;

      const payload = {
        day: modalContext.day,
        time: modalContext.time,
        instructor: instructorSelect.value,
        zoom: zoomSelect.value,
      };
      upsertEvent(payload, modalContext.existing ? eventKey(modalContext.existing) : "");
      modal.close();
    };

    document.getElementById("deleteBtn").onclick = () => {
      if (!modalContext) return;
      if (!modalContext.existing) return;
      deleteEventByKey(eventKey(modalContext.existing));
      modal.close();
    };

    document.getElementById("cancelBtn").onclick = () => modal.close();

    instructorSelect.onchange = () => {
      if (!modalContext) return;
      const { day, time, existing } = modalContext;
      const ignore = existing ? eventKey(existing) : "";
      const chosen = instructorSelect.value;

      if (chosen && !isInstructorFree(day, time, chosen, ignore)) {
        validationMessage.textContent = "המדריך כבר משובץ בזמן חופף. בחר מדריך אחר.";
      } else {
        validationMessage.textContent = "";
      }
      refreshZoomOptions();
      const preferredZoom = chosen ? getPreferredZoom(day, time, chosen, ignore) : "";
      if (preferredZoom) {
        zoomSelect.value = preferredZoom;
      } else if (chosen && !existing) {
        zoomSelect.value = "";
        if (!getAvailableZooms(day, time, ignore).length) {
          validationMessage.textContent = "No available Zoom account for this time slot.";
        }
      }
      validateSelections();
    };

    zoomSelect.onchange = validateSelections;

    document.getElementById("clearWeekBtn").onclick = () => {
      if (!confirm("למחוק את כל שיבוצי השבוע?")) return;
      schedule = [];
      persistSchedule();
      renderBoard();
    };

    searchInstructor.oninput = renderBoard;
    zoomFilter.onchange = renderBoard;

    function updateStats() {
      const counts = { Zoom1: 0, Zoom2: 0, Zoom3: 0 };
      schedule.forEach((e) => counts[e.zoom]++);
      document.getElementById("stats").textContent = `סה"כ שיבוצים: ${schedule.length} | Zoom1: ${counts.Zoom1} | Zoom2: ${counts.Zoom2} | Zoom3: ${counts.Zoom3}`;
    }

    renderBoard();
  </script>
</body>
</html>
