<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>תעשיידע – מנהל זום</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d2e;
    --surface2: #22263a;
    --accent: #6c63ff;
    --accent2: #00d4aa;
    --accent3: #ff6b6b;
    --text: #e8eaf6;
    --text-muted: #8892b0;
    --border: #2d3354;
    --zoom1: #3b82f6;
    --zoom2: #10b981;
    --zoom3: #f59e0b;
    --card-shadow: 0 4px 24px rgba(108,99,255,0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', Arial, sans-serif;
    min-height: 100vh;
    direction: rtl;
  }

  header {
    background: linear-gradient(135deg, #1a1d2e 0%, #22263a 100%);
    border-bottom: 1px solid var(--border);
    padding: 18px 32px;
    display: flex;
    align-items: center;
    gap: 16px;
    box-shadow: 0 2px 20px rgba(108,99,255,0.15);
  }

  header .logo {
    font-size: 1.6rem;
    font-weight: 800;
    background: linear-gradient(135deg, #6c63ff, #00d4aa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -0.5px;
  }

  header .subtitle {
    color: var(--text-muted);
    font-size: 0.9rem;
  }

  header .zoom-legend {
    margin-right: auto;
    display: flex;
    gap: 12px;
    align-items: center;
  }

  .zoom-badge {
    padding: 5px 14px;
    border-radius: 20px;
    font-size: 0.78rem;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .zoom-badge .dot { width: 8px; height: 8px; border-radius: 50%; }
  .z1 { background: rgba(59,130,246,0.15); border: 1px solid rgba(59,130,246,0.4); color: #93c5fd; }
  .z1 .dot { background: var(--zoom1); }
  .z2 { background: rgba(16,185,129,0.15); border: 1px solid rgba(16,185,129,0.4); color: #6ee7b7; }
  .z2 .dot { background: var(--zoom2); }
  .z3 { background: rgba(245,158,11,0.15); border: 1px solid rgba(245,158,11,0.4); color: #fcd34d; }
  .z3 .dot { background: var(--zoom3); }

  .days-nav {
    display: flex;
    gap: 8px;
    padding: 20px 32px 0;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  .day-tab {
    padding: 10px 22px;
    border-radius: 10px 10px 0 0;
    border: 1px solid var(--border);
    border-bottom: none;
    background: var(--bg);
    color: var(--text-muted);
    cursor: pointer;
    font-size: 0.92rem;
    font-weight: 600;
    transition: all 0.2s;
  }

  .day-tab:hover { background: var(--surface2); color: var(--text); }

  .day-tab.active {
    background: var(--surface2);
    color: var(--accent);
    border-color: var(--accent);
    position: relative;
  }

  .day-tab.active::after {
    content: '';
    position: absolute;
    bottom: -1px; left: 0; right: 0;
    height: 2px;
    background: var(--surface2);
  }

  .main {
    padding: 28px 32px;
    background: var(--bg);
    min-height: calc(100vh - 140px);
  }

  .day-view { display: none; }
  .day-view.active { display: block; }

  .day-title {
    font-size: 1.3rem;
    font-weight: 700;
    margin-bottom: 24px;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .day-title::before {
    content: '';
    display: block;
    width: 4px; height: 24px;
    background: linear-gradient(180deg, var(--accent), var(--accent2));
    border-radius: 2px;
  }

  .schedule-grid {
    display: grid;
    gap: 12px;
  }

  .slot-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px 20px;
    display: grid;
    grid-template-columns: 140px 1fr 1fr 1fr auto;
    align-items: center;
    gap: 16px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .slot-card:hover {
    border-color: rgba(108,99,255,0.4);
    box-shadow: 0 4px 20px rgba(108,99,255,0.1);
  }

  .slot-time {
    font-size: 1rem;
    font-weight: 700;
    color: var(--accent2);
    background: rgba(0,212,170,0.08);
    padding: 8px 14px;
    border-radius: 8px;
    text-align: center;
    border: 1px solid rgba(0,212,170,0.2);
    white-space: nowrap;
  }

  .zoom-slot {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    min-height: 72px;
  }

  .zoom-label {
    font-size: 0.72rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .zoom-label.z1 { color: #93c5fd; }
  .zoom-label.z2 { color: #6ee7b7; }
  .zoom-label.z3 { color: #fcd34d; }

  .instructor-select {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--text);
    font-size: 0.82rem;
    padding: 6px 10px;
    width: 100%;
    cursor: pointer;
    transition: border-color 0.2s;
    appearance: none;
    direction: rtl;
  }

  .instructor-select:focus {
    outline: none;
    border-color: var(--accent);
  }

  .instructor-select:disabled {
    opacity: 0.35;
    cursor: not-allowed;
    background: rgba(255,107,107,0.05);
    border-color: rgba(255,107,107,0.2);
  }

  .assigned-pill {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(108,99,255,0.12);
    border: 1px solid rgba(108,99,255,0.3);
    border-radius: 7px;
    padding: 6px 10px;
    font-size: 0.82rem;
    color: #c4bfff;
  }

  .clear-btn {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 0.9rem;
    line-height: 1;
    padding: 2px 4px;
    border-radius: 4px;
    transition: color 0.15s, background 0.15s;
  }

  .clear-btn:hover { color: var(--accent3); background: rgba(255,107,107,0.1); }

  .slot-action {
    display: flex;
    align-items: center;
  }

  .status-icon {
    width: 36px; height: 36px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem;
  }

  .status-full { background: rgba(16,185,129,0.15); border: 1px solid rgba(16,185,129,0.3); }
  .status-partial { background: rgba(245,158,11,0.15); border: 1px solid rgba(245,158,11,0.3); }
  .status-empty { background: rgba(255,107,107,0.1); border: 1px solid rgba(255,107,107,0.2); }

  .stats-bar {
    display: flex;
    gap: 16px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  .stat-chip {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 18px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.85rem;
  }

  .stat-chip .val {
    font-size: 1.2rem;
    font-weight: 800;
  }
  .stat-chip .val.green { color: var(--accent2); }
  .stat-chip .val.yellow { color: #fcd34d; }
  .stat-chip .val.purple { color: var(--accent); }

  .separator {
    color: var(--text-muted);
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 1px;
    padding: 8px 0 4px;
    border-bottom: 1px dashed var(--border);
    margin-bottom: 8px;
  }

  .toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(60px);
    background: var(--accent3);
    color: white;
    padding: 12px 24px;
    border-radius: 10px;
    font-weight: 600;
    font-size: 0.9rem;
    transition: transform 0.3s ease;
    z-index: 999;
    box-shadow: 0 8px 32px rgba(255,107,107,0.3);
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  @media (max-width: 900px) {
    .slot-card {
      grid-template-columns: 1fr;
    }
    .main { padding: 16px; }
  }
</style>
</head>
<body>

<header>
  <div>
    <div class="logo">📡 תעשיידע</div>
    <div class="subtitle">מנהל מערך זום</div>
  </div>
  <div class="zoom-legend">
    <div class="zoom-badge z1"><span class="dot"></span>Zoom1</div>
    <div class="zoom-badge z2"><span class="dot"></span>Zoom2</div>
    <div class="zoom-badge z3"><span class="dot"></span>Zoom3</div>
  </div>
</header>

<div class="days-nav" id="daysNav"></div>
<div class="main" id="mainContent"></div>

<div class="toast" id="toast">⚠️ אין חשבון זום פנוי בשעה זו!</div>

<script>
const DAYS = ['ראשון','שני','שלישי','רביעי','חמישי','שישי'];
const ZOOM_ACCOUNTS = ['Zoom1','Zoom2','Zoom3'];

const TIME_SLOTS_DOUBLE = ['08:00-10:00','10:00-12:00','12:00-14:00','14:00-16:00'];
const TIME_SLOTS_SINGLE = ['08:00-09:00','09:00-10:00','10:00-11:00','11:00-12:00','12:00-13:00','13:00-14:00','14:00-15:00'];

const INSTRUCTORS = [
  'הנאא אבו אמזה','הילה רוזן','ראנה סאלח','סוהא סאלם','מיכל שכטמן',
  'אלדר מיכאל טייב','אביגדור שרון','אסיל ג׳בר','אביב בלנדר','ברקת קטעי',
  'ליאל בן חמו','אלכס זפקה','אפרת אוחיון','עליזה מולה','כרמית סמנדרוב',
  'קרן גורביץ','אוריה פדידה','אילנה טיטייבסקי'
];

// State: schedule[day][slot][zoom] = instructorName or null
const schedule = {};
DAYS.forEach(day => {
  schedule[day] = {};
  [...TIME_SLOTS_DOUBLE, ...TIME_SLOTS_SINGLE].forEach(slot => {
    schedule[day][slot] = { Zoom1: null, Zoom2: null, Zoom3: null };
  });
});

function getUsedZoomsInSlot(day, slot) {
  return ZOOM_ACCOUNTS.filter(z => schedule[day][slot][z] !== null);
}

function getFreeZoomsInSlot(day, slot) {
  return ZOOM_ACCOUNTS.filter(z => schedule[day][slot][z] === null);
}

function getUsedInstructorsOnDay(day) {
  const used = new Set();
  Object.values(schedule[day]).forEach(slotData => {
    Object.values(slotData).forEach(v => { if (v) used.add(v); });
  });
  return used;
}

function showToast() {
  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function renderStats(day) {
  const allSlots = [...TIME_SLOTS_DOUBLE, ...TIME_SLOTS_SINGLE];
  let totalAssigned = 0, totalPossible = allSlots.length * 3;
  allSlots.forEach(slot => {
    ZOOM_ACCOUNTS.forEach(z => {
      if (schedule[day][slot][z]) totalAssigned++;
    });
  });
  const instructors = getUsedInstructorsOnDay(day).size;

  return `<div class="stats-bar">
    <div class="stat-chip"><span class="val green">${totalAssigned}</span> שיבוצים</div>
    <div class="stat-chip"><span class="val yellow">${totalPossible - totalAssigned}</span> חריצים פנויים</div>
    <div class="stat-chip"><span class="val purple">${instructors}</span> מדריכים פעילים</div>
  </div>`;
}

function renderZoomSlot(day, slot, zoom, zIdx) {
  const val = schedule[day][slot][zoom];
  const isFree = val === null;
  const zClass = `z${zIdx+1}`;
  const usedOnDay = getUsedInstructorsOnDay(day);

  if (!isFree) {
    return `<div class="zoom-slot">
      <span class="zoom-label ${zClass}">${zoom}</span>
      <div class="assigned-pill">
        <span>${val}</span>
        <button class="clear-btn" onclick="clearSlot('${day}','${slot}','${zoom}')" title="נקה">✕</button>
      </div>
    </div>`;
  }

  const opts = INSTRUCTORS.map(inst => {
    return `<option value="${inst}">${inst}</option>`;
  }).join('');

  return `<div class="zoom-slot">
    <span class="zoom-label ${zClass}">${zoom}</span>
    <select class="instructor-select" onchange="assignInstructor('${day}','${slot}','${zoom}',this)">
      <option value="">-- בחר מדריך --</option>
      ${opts}
    </select>
  </div>`;
}

function getStatusIcon(day, slot) {
  const free = getFreeZoomsInSlot(day, slot).length;
  if (free === 0) return `<div class="status-icon status-full">✅</div>`;
  if (free === 3) return `<div class="status-icon status-empty">⭕</div>`;
  return `<div class="status-icon status-partial">🔶</div>`;
}

function renderSlot(day, slot) {
  return `<div class="slot-card" id="card-${day}-${slot.replace(/:/g,'-').replace('--','-')}">
    <div class="slot-time">${slot}</div>
    ${ZOOM_ACCOUNTS.map((z,i) => renderZoomSlot(day, slot, z, i)).join('')}
    ${getStatusIcon(day, slot)}
  </div>`;
}

function renderDay(day) {
  const html = `
    <div class="day-title">${day}</div>
    ${renderStats(day)}
    <div class="schedule-grid">
      <div class="separator">שעות כפולות (2 שעות)</div>
      ${TIME_SLOTS_DOUBLE.map(s => renderSlot(day, s)).join('')}
      <div class="separator">שעות בודדות (1 שעה)</div>
      ${TIME_SLOTS_SINGLE.map(s => renderSlot(day, s)).join('')}
    </div>
  `;
  return html;
}

function assignInstructor(day, slot, zoom, selectEl) {
  const instructor = selectEl.value;
  if (!instructor) return;

  const freeZooms = getFreeZoomsInSlot(day, slot);
  if (freeZooms.length === 0) {
    showToast();
    selectEl.value = '';
    return;
  }

  // Check if instructor already assigned in same slot (another zoom)
  const alreadyInSlot = ZOOM_ACCOUNTS.some(z => schedule[day][slot][z] === instructor);
  if (alreadyInSlot) {
    alert(`${instructor} כבר משובץ בשעה זו!`);
    selectEl.value = '';
    return;
  }

  schedule[day][slot][zoom] = instructor;
  refreshDayView(day);
}

function clearSlot(day, slot, zoom) {
  schedule[day][slot][zoom] = null;
  refreshDayView(day);
}

let currentDay = DAYS[0];

function refreshDayView(day) {
  const el = document.getElementById(`day-view-${DAYS.indexOf(day)}`);
  if (el) el.innerHTML = renderDay(day);
}

function init() {
  const nav = document.getElementById('daysNav');
  const main = document.getElementById('mainContent');

  DAYS.forEach((day, i) => {
    const tab = document.createElement('div');
    tab.className = 'day-tab' + (i === 0 ? ' active' : '');
    tab.textContent = day;
    tab.onclick = () => {
      document.querySelectorAll('.day-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.day-view').forEach(v => v.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById(`day-view-${i}`).classList.add('active');
      currentDay = day;
    };
    nav.appendChild(tab);

    const view = document.createElement('div');
    view.className = 'day-view' + (i === 0 ? ' active' : '');
    view.id = `day-view-${i}`;
    view.innerHTML = renderDay(day);
    main.appendChild(view);
  });
}

init();
</script>
</body>
</html>
